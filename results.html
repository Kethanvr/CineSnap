      to {

      <!-- Mobile Menu Button (Hamburger Icon) -->

        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
        </svg>
      </button>

      <!-- Navbar Links and Search Bar (Hidden on Mobile) -->

        <a href="#movies" class="hover:text-indigo-200 transition">Movies</a>
        <a href="#about" class="hover:text-indigo-200 transition">About</a>
        <a href="#contact" class="hover:text-indigo-200 transition">Contact</a>
        <!-- Search Bar in Navbar -->

          <input

            name="query"

            id="navbar-search-input"
            type="text"
          />
          <button type="submit" class="absolute top-2 right-2">

              fill="slate-300"
              viewBox="0 0 24 24"
              height="20"
              width="20"
            >
              <path
                d="M10.979 16.8991C11.0591 17.4633 10.6657 17.9926 10.0959 17.9994C8.52021 18.0183 6.96549 17.5712 5.63246 16.7026C4.00976 15.6452 2.82575 14.035 2.30018 12.1709C1.77461 10.3068 1.94315 8.31525 2.77453 6.56596C3.60592 4.81667 5.04368 3.42838 6.82101 2.65875C8.59833 1.88911 10.5945 1.79039 12.4391 2.3809C14.2837 2.97141 15.8514 4.21105 16.8514 5.86977C17.8513 7.52849 18.2155 9.49365 17.8764 11.4005C17.5979 12.967 16.8603 14.4068 15.7684 15.543C15.3736 15.9539 14.7184 15.8787 14.3617 15.4343C14.0051 14.9899 14.0846 14.3455 14.4606 13.9173C15.1719 13.1073 15.6538 12.1134 15.8448 11.0393C16.0964 9.62426 15.8261 8.166 15.0841 6.93513C14.3421 5.70426 13.1788 4.78438 11.81 4.34618C10.4412 3.90799 8.95988 3.98125 7.641 4.55236C6.32213 5.12348 5.25522 6.15367 4.63828 7.45174C4.02135 8.74982 3.89628 10.2276 4.28629 11.6109C4.67629 12.9942 5.55489 14.1891 6.75903 14.9737C7.67308 15.5693 8.72759 15.8979 9.80504 15.9333C10.3746 15.952 10.8989 16.3349 10.979 16.8991Z"

    </div>

    <!-- Mobile Menu (Hidden by Default) -->
    <div class="md:hidden hidden mt-4" id="mobile-menu">
      <a href="#home" class="block py-2 text-white hover:text-indigo-200">Home</a>
      <a href="#movies" class="block py-2 text-white hover:text-indigo-200">Movies</a>
      <a href="#about" class="block py-2 text-white hover:text-indigo-200">About</a>
      <a href="#contact" class="block py-2 text-white hover:text-indigo-200">Contact</a>
      <!-- Search Bar in Mobile Menu -->
      <form action="results.html" method="get" class="relative mt-4">
        <input
          value=""
          placeholder="Search..."
          name="query"
          class="block w-full text-sm h-[40px] px-4 text-slate-900 bg-white rounded-[8px] border border-slate-200 appearance-none focus:border-transparent focus:outline focus:outline-2 focus:outline-primary focus:ring-0 hover:border-brand-500-secondary- peer invalid:border-error-500 invalid:focus:border-error-500 overflow-ellipsis overflow-hidden text-nowrap pr-[48px]"
          id="mobile-search-input"
          type="text"
        />
        <button type="submit" class="absolute top-2 right-2">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="slate-300"
            viewBox="0 0 24 24"
            height="20"
            width="20"
          >
            <path
              d="M10.979 16.8991C11.0591 17.4633 10.6657 17.9926 10.0959 17.9994C8.52021 18.0183 6.96549 17.5712 5.63246 16.7026C4.00976 15.6452 2.82575 14.035 2.30018 12.1709C1.77461 10.3068 1.94315 8.31525 2.77453 6.56596C3.60592 4.81667 5.04368 3.42838 6.82101 2.65875C8.59833 1.88911 10.5945 1.79039 12.4391 2.3809C14.2837 2.97141 15.8514 4.21105 16.8514 5.86977C17.8513 7.52849 18.2155 9.49365 17.8764 11.4005C17.5979 12.967 16.8603 14.4068 15.7684 15.543C15.3736 15.9539 14.7184 15.8787 14.3617 15.4343C14.0051 14.9899 14.0846 14.3455 14.4606 13.9173C15.1719 13.1073 15.6538 12.1134 15.8448 11.0393C16.0964 9.62426 15.8261 8.166 15.0841 6.93513C14.3421 5.70426 13.1788 4.78438 11.81 4.34618C10.4412 3.90799 8.95988 3.98125 7.641 4.55236C6.32213 5.12348 5.25522 6.15367 4.63828 7.45174C4.02135 8.74982 3.89628 10.2276 4.28629 11.6109C4.67629 12.9942 5.55489 14.1891 6.75903 14.9737C7.67308 15.5693 8.72759 15.8979 9.80504 15.9333C10.3746 15.952 10.8989 16.3349 10.979 16.8991Z"
            ></path>
            <rect
              transform="rotate(-49.6812 12.2469 14.8859)"
              rx="1"
              height="10.1881"
              width="2"

              x="12.2469"
            ></rect>
          </svg>
        </button>
      </form>
    </div>
  </nav>

  <!-- Hero Section -->
  <section id="search-results" class="py-12 bg-gray-800">
    <div class="max-w-7xl mx-auto text-center">
      <h3 class="text-4xl font-semibold text-white mb-6">Search Results</h3>
      <div class="flex flex-wrap justify-center gap-8" id="movie-cards-container">
        <!-- Movie Cards Will Be Injected Here by JavaScript -->
      </div>
    </div>
  </section>

  <!-- Footer Section -->
  <footer id="contact" class="bg-gray-800 text-center py-8">
    <p class="text-sm text-gray-400">© 2025 CineShot - All Rights Reserved.</p>
  </footer>

  <script>
    // Get the search query from the URL
    const urlParams = new URLSearchParams(window.location.search);
    const query = urlParams.get('query');

    // Fetch the search results from TMDB API
    async function fetchSearchResults() {
      if (!query) return; // If no query, don't fetch results

      const response = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=3b2a03d9bd97894a3db2bca78d548059&query=${query}`);
      const data = await response.json();
      const movies = data.results;
      const movieCardsContainer = document.getElementById('movie-cards-container');
      
      if (movies.length === 0) {
        movieCardsContainer.innerHTML = "<p class='text-white'>No results found. Please try a different search.</p>";
        return;
      }

      // Loop through the search results and create cards dynamically
      movies.forEach(movie => {
        const movieCard = `
          <div class="w-64 h-auto bg-gray-700 rounded-lg shadow-xl overflow-hidden transform transition-all hover:scale-105 hover:shadow-2xl" onclick="window.location.href='movie-details.html?id=${movie.id}'">
            <!-- Movie Poster -->
            <img src="https://image.tmdb.org/t/p/original${movie.poster_path}" alt="${movie.original_title}" class="w-full h-auto object-cover">
            <!-- Movie Title -->
            <h4 class="text-xl font-bold text-white mt-4">${movie.original_title}</h4>
            <!-- Movie Voting -->
            <div class="flex items-center mt-2">
              <span class="text-yellow-400 mr-2">⭐</span>
              <span class="text-white">${movie.vote_average}</span>
              <span class="text-gray-400 ml-2">(${movie.vote_count} votes)</span>
            </div>
          </div>
        `;
        movieCardsContainer.innerHTML += movieCard;
      });
    }

    // Call the function on page load
    fetchSearchResults();

     // Toggle Mobile Menu
     document.getElementById('mobile-menu-button').addEventListener('click', () => {
      const mobileMenu = document.getElementById('mobile-menu');
      mobileMenu.classList.toggle('hidden');
    });
  </script>

</body>
</html>
