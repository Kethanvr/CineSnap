<head>

  <!-- Tailwind CSS CDN -->

      font-family: 'Poppins', sans-serif;

    /* For backdrop image */

      height: 70vh;
      background-size: cover;

    /* Custom styles for links */

      color: #60a5fa;
      text-decoration: underline;
      transition: color 0.3s ease;
    }
    .custom-link:hover {
      color: #3b82f6;
    }

</head>

      </button>

        <a href="#movies" class="hover:text-indigo-200 transition">Movies</a>
        <a href="#about" class="hover:text-indigo-200 transition">About</a>
        <a href="#contact" class="hover:text-indigo-200 transition">Contact</a>
        <!-- Search Bar in Navbar -->
        <form action="results.html" method="get" class="relative">
          <input

              height="20"
              width="20"

              ></path>
              <rect
                transform="rotate(-49.6812 12.2469 14.8859)"
                rx="1"

      </div>
    </div>

    <!-- Mobile Menu (Hidden by Default) -->
    <div class="md:hidden hidden mt-4" id="mobile-menu">
      <a href="#home" class="block py-2 text-white hover:text-indigo-200">Home</a>
      <a href="#movies" class="block py-2 text-white hover:text-indigo-200">Movies</a>
      <a href="#about" class="block py-2 text-white hover:text-indigo-200">About</a>
      <a href="#contact" class="block py-2 text-white hover:text-indigo-200">Contact</a>
      <!-- Search Bar in Mobile Menu -->
      <form action="results.html" method="get" class="relative mt-4">
        <input
          value=""
          placeholder="Search..."
          name="query"
          class="block w-full text-sm h-[40px] px-4 text-slate-900 bg-white rounded-[8px] border border-slate-200 appearance-none focus:border-transparent focus:outline focus:outline-2 focus:outline-primary focus:ring-0 hover:border-brand-500-secondary- peer invalid:border-error-500 invalid:focus:border-error-500 overflow-ellipsis overflow-hidden text-nowrap pr-[48px]"
          id="mobile-search-input"
          type="text"
        />
        <button type="submit" class="absolute top-2 right-2">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="slate-300"
            viewBox="0 0 24 24"
            height="20"
            width="20"
          >
            <path
              d="M10.979 16.8991C11.0591 17.4633 10.6657 17.9926 10.0959 17.9994C8.52021 18.0183 6.96549 17.5712 5.63246 16.7026C4.00976 15.6452 2.82575 14.035 2.30018 12.1709C1.77461 10.3068 1.94315 8.31525 2.77453 6.56596C3.60592 4.81667 5.04368 3.42838 6.82101 2.65875C8.59833 1.88911 10.5945 1.79039 12.4391 2.3809C14.2837 2.97141 15.8514 4.21105 16.8514 5.86977C17.8513 7.52849 18.2155 9.49365 17.8764 11.4005C17.5979 12.967 16.8603 14.4068 15.7684 15.543C15.3736 15.9539 14.7184 15.8787 14.3617 15.4343C14.0051 14.9899 14.0846 14.3455 14.4606 13.9173C15.1719 13.1073 15.6538 12.1134 15.8448 11.0393C16.0964 9.62426 15.8261 8.166 15.0841 6.93513C14.3421 5.70426 13.1788 4.78438 11.81 4.34618C10.4412 3.90799 8.95988 3.98125 7.641 4.55236C6.32213 5.12348 5.25522 6.15367 4.63828 7.45174C4.02135 8.74982 3.89628 10.2276 4.28629 11.6109C4.67629 12.9942 5.55489 14.1891 6.75903 14.9737C7.67308 15.5693 8.72759 15.8979 9.80504 15.9333C10.3746 15.952 10.8989 16.3349 10.979 16.8991Z"
            ></path>

              transform="rotate(-49.6812 12.2469 14.8859)"

            ></rect>
          </svg>

      </form>
    </div>
  </nav>

  <!-- Movie Details Section -->
  <section id="movie-details" class="py-20 bg-gray-800">
    <div class="max-w-7xl mx-auto flex flex-col lg:flex-row gap-12">
      
      <!-- Left Side: Backdrop Image -->
      <div class="w-full lg:w-2/5">
        <div id="backdrop" class="bg-cover" style="background-image: url('');"></div>
        <div class="mt-4 text-center text-gray-300">
          <p class="text-lg"> Release Date: <span id="release-date"></span></p>
          <p class="text-lg">Rating:  <span id="vote-average"></span>/10 ⭐ </p>
          <p class="text-lg">Votes  : <span id="vote-count"></span></p>
          <p class="text-lg"> Countries of Origin : <span id="production-countries"></span></p>
        </div>

        <!-- Production Companies Card (Visible on Desktop) -->
        <div class="mt-8 bg-gray-700 p-4 rounded-lg lg:block hidden">
          <h3 class="text-xl font-semibold text-white">Production Companies</h3>
          <div id="production-companies-desktop" class="mt-2 space-y-4">
            <!-- Production companies will be injected here -->
          </div>
        </div>
      </div>

      <!-- Right Side: Movie Information -->
      <div class="w-full lg:w-3/5">
        <h2 class="text-4xl font-bold text-white mb-4" id="movie-title"></h2>
        <p class="text-lg text-gray-400 mb-4" id="movie-overview"></p>

        <div class="text-gray-300">
          <p><strong>Genres:</strong> <span id="movie-genres"></span></p>
          <p><strong>Runtime:</strong> <span id="runtime"></span> min</p>
          <p><strong>Budget:</strong> $<span id="budget"></span></p>
          <p><strong>Revenue:</strong> $<span id="revenue"></span></p>
          <p><strong>Language:</strong> <span id="original-language"></span></p>
        </div>

        <div class="mt-8 grid grid-cols-1 sm:grid-cols-2 gap-6">
          <!-- Images Card -->
          <a href="#" id="images-link" class="block bg-gray-700 p-4 rounded-lg hover:bg-gray-600 transition ease-in-out duration-300">
            <h3 class="text-xl font-semibold text-white">Images</h3>
            <div id="images" class="mt-2">
              <!-- Poster image will be injected here -->
            </div>
          </a>

          <!-- Cast Card -->
          <div class="bg-gray-700 p-4 rounded-lg">
            <h3 class="text-xl font-semibold text-white">Cast</h3>
            <div id="cast-list" class="mt-2 space-y-4">
              <!-- Cast details will be injected here -->
            </div>
          </div>

          <!-- Reviews Card -->
          <div class="bg-gray-700 p-4 rounded-lg">
            <h3 class="text-xl font-semibold text-white">Reviews</h3>
            <div id="reviews" class="mt-2 space-y-4">
              <!-- Reviews will be injected here -->
            </div>
          </div>

          <!-- Crew Card -->
          <div class="bg-gray-700 p-4 rounded-lg">
            <h3 class="text-xl font-semibold text-white">Crew</h3>
            <div id="crew" class="mt-2 space-y-4">
              <!-- Crew details will be injected here -->
            </div>
          </div>
        </div>

        <!-- Production Companies Card (Visible on Mobile) -->
        <div class="mt-8 bg-gray-700 p-4 rounded-lg lg:hidden">
          <h3 class="text-xl font-semibold text-white">Production Companies</h3>
          <div id="production-companies-mobile" class="mt-2 space-y-4">
            <!-- Production companies will be injected here -->
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    // Get the movie ID from the URL
    const urlParams = new URLSearchParams(window.location.search);
    const movieId = urlParams.get('id');

    // Fetch movie details, credits, and reviews
    async function fetchMovieDetails() {
      // Fetch movie details
      const movieResponse = await fetch(`https://api.themoviedb.org/3/movie/${movieId}?api_key=3b2a03d9bd97894a3db2bca78d548059`);
      const movie = await movieResponse.json();

      // Fetch credits (cast and crew)
      const creditsResponse = await fetch(`https://api.themoviedb.org/3/movie/${movieId}/credits?api_key=3b2a03d9bd97894a3db2bca78d548059`);
      const credits = await creditsResponse.json();

      // Fetch reviews
      const reviewsResponse = await fetch(`https://api.themoviedb.org/3/movie/${movieId}/reviews?api_key=3b2a03d9bd97894a3db2bca78d548059`);
      const reviews = await reviewsResponse.json();

      // Set the backdrop image
      document.getElementById('backdrop').style.backgroundImage = `url('https://image.tmdb.org/t/p/original${movie.backdrop_path}')`;

      // Set the movie details
      document.getElementById('movie-title').textContent = movie.original_title;
      document.getElementById('movie-overview').textContent = movie.overview;
      document.getElementById('release-date').textContent = new Date(movie.release_date).toLocaleDateString();
      document.getElementById('vote-average').textContent = Math.round(movie.vote_average);
      document.getElementById('vote-count').textContent = movie.vote_count;
      document.getElementById('production-countries').textContent = movie.production_countries.map(c => c.name).join(", ");
      document.getElementById('movie-genres').textContent = movie.genres.map(g => g.name).join(", ");
      document.getElementById('runtime').textContent = movie.runtime;
      document.getElementById('budget').textContent = movie.budget.toLocaleString();
      document.getElementById('revenue').textContent = movie.revenue.toLocaleString();
      document.getElementById('original-language').textContent = movie.original_language;

      // Set poster image in the Images card
      const posterImage = movie.poster_path ? `<img src="https://image.tmdb.org/t/p/original${movie.poster_path}" alt="${movie.original_title}" class="w-full h-auto rounded-lg">` : "<p>No poster available</p>";
      document.getElementById('images').innerHTML = posterImage;

      // Set cast details (first 6 cast members)
      const castList = credits.cast.slice(0, 6).map(cast => `
        <div class="flex items-center space-x-4">
          <img src="https://image.tmdb.org/t/p/original${cast.profile_path}" alt="${cast.original_name}" class="w-16 h-16 rounded-full">
          <div>
            <p class="text-white"><strong>Name:</strong> ${cast.original_name}</p>
            <p class="text-gray-400"><strong>Character:</strong> ${cast.character}</p>
          </div>
        </div>
      `).join("");
      document.getElementById('cast-list').innerHTML = castList || "<p>No cast available</p>";

      // Set crew details (first 5 crew members)
      const crewList = credits.crew.slice(0, 5).map(crew => `
        <div class="flex items-center space-x-4">
          <img src="https://image.tmdb.org/t/p/original${crew.profile_path}" alt="${crew.original_name}" class="w-16 h-16 rounded-full">
          <div>
            <p class="text-white"><strong>Name:</strong> ${crew.original_name}</p>
            <p class="text-gray-400"><strong>Job:</strong> ${crew.job}</p>
          </div>
        </div>
      `).join("");
      document.getElementById('crew').innerHTML = crewList || "<p>No crew available</p>";

      // Set reviews (first 3 reviews)
      const reviewList = reviews.results.slice(0, 3).map(review => `
        <div class="flex items-center space-x-4">
          <img src="https://image.tmdb.org/t/p/original${review.author_details.avatar_path}" alt="${review.author_details.name}" class="w-16 h-16 rounded-full">
          <div>
            <p class="text-white"><strong>Name:</strong> <a href="${review.url}" target="_blank" class="custom-link">${review.author_details.name}</a></p>
            <p class="text-gray-400"><strong>Rating:</strong> ${review.author_details.rating}/10 ⭐</p>
          </div>
        </div>
      `).join("");
      document.getElementById('reviews').innerHTML = reviewList || "<p>No reviews available</p>";

      // Set production companies (first 5 companies)
      const productionCompaniesList = movie.production_companies.slice(0, 5).map(company => `
        <div class="flex items-center space-x-4">
          <img src="https://image.tmdb.org/t/p/original${company.logo_path}" alt="${company.name}" class="w-16 h-16 rounded-full">
          <div>
            <p class="text-white"><strong>Name:</strong> ${company.name}</p>
            <p class="text-gray-400"><strong>Country:</strong> ${company.origin_country}</p>
          </div>
        </div>
      `).join("");
      document.getElementById('production-companies-desktop').innerHTML = productionCompaniesList || "<p>No production companies available</p>";
      document.getElementById('production-companies-mobile').innerHTML = productionCompaniesList || "<p>No production companies available</p>";

      // Dynamically set the "Images" link to pass the correct movie ID (FIXED LINE)
      const imagesLink = document.getElementById('images-link');
      imagesLink.href = `images.html?id=${movieId}`;  // Changed to relative path
    }

    // Call the function to fetch movie details
    fetchMovieDetails();
  </script>

</body>
</html>
