<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Images - CineShot</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Poppins', sans-serif; }
    .image-container { position: relative; }
    .download-btn { 
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      opacity: 0.9;
      transition: opacity 0.2s ease;
    }
    .download-btn:hover { opacity: 1; }
  </style>
</head>
<body class="bg-gray-900 text-white">

  <!-- Navbar -->
  <nav class="w-full p-4 bg-gradient-to-r from-indigo-600 to-blue-500 shadow-lg">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <h1 class="text-3xl font-semibold text-white">CineShot</h1>
      <a href="results.html" class="text-lg text-white hover:text-indigo-200">Back to Results</a>
    </div>
  </nav>

  <!-- Images Section -->
  <section class="py-20 bg-gray-800">
    <div class="max-w-7xl mx-auto">
      <h2 class="text-4xl font-bold text-white mb-8 px-4">Movie Images</h2>

      <!-- Filter Buttons -->
      <div class="flex gap-4 mb-8 px-4">
        <button id="wallpaper-btn" class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600 transition">
          Wallpaper
        </button>
        <button id="logo-btn" class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600 transition">
          Logo
        </button>
        <button id="poster-btn" class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600 transition">
          Poster
        </button>
      </div>

      <!-- Image Grid -->
      <div id="image-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 px-4"></div>

      <!-- Load More Button -->
      <div class="mt-8 flex justify-center">
        <button id="load-more" class="bg-indigo-600 text-white px-8 py-3 rounded-lg hover:bg-indigo-700 transition hidden">
          Load More
        </button>
      </div>
    </div>
  </section>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const movieId = urlParams.get('id');
    let currentOffset = 0;
    let currentType = 'wallpaper';
    const imagesPerPage = 9;

    async function fetchMovieImages(type, offset = 0) {
      const response = await fetch(
        `https://api.themoviedb.org/3/movie/${movieId}/images?api_key=3b2a03d9bd97894a3db2bca78d548059`
      );
      const data = await response.json();
      
      let images = [];
      switch(type) {
        case 'wallpaper': images = data.backdrops; break;
        case 'logo': images = data.logos; break;
        case 'poster': images = data.posters; break;
      }

      return images.slice(offset, offset + imagesPerPage);
    }

    function createImageCard(image) {
      const card = document.createElement('div');
      card.className = 'bg-gray-700 p-4 rounded-lg image-container';
      
      const img = document.createElement('img');
      img.src = `https://image.tmdb.org/t/p/original${image.file_path}`;
      img.alt = 'Movie Image';
      img.className = 'w-full h-auto rounded-lg';
      
      const downloadBtn = document.createElement('button');
      downloadBtn.className = 'download-btn bg-white p-2 rounded-full shadow-lg';
      downloadBtn.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-800" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
      `;
      
      downloadBtn.onclick = () => downloadImage(img.src);
      card.appendChild(img);
      card.appendChild(downloadBtn);
      
      return card;
    }

    async function downloadImage(url) {
      try {
        const response = await fetch(url);
        const blob = await response.blob();
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `movie-image-${Date.now()}.jpg`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      } catch (error) {
        console.error('Download failed:', error);
      }
    }

    async function renderImages(type, reset = true) {
      currentType = type;
      if (reset) currentOffset = 0;
      
      const images = await fetchMovieImages(type, currentOffset);
      const grid = document.getElementById('image-grid');
      
      if (reset) grid.innerHTML = '';
      images.forEach(image => grid.appendChild(createImageCard(image)));
      
      currentOffset += imagesPerPage;
      document.getElementById('load-more').classList.toggle('hidden', images.length < imagesPerPage);
    }

    // Event Listeners
    document.getElementById('wallpaper-btn').addEventListener('click', () => renderImages('wallpaper'));
    document.getElementById('logo-btn').addEventListener('click', () => renderImages('logo'));
    document.getElementById('poster-btn').addEventListener('click', () => renderImages('poster'));
    document.getElementById('load-more').addEventListener('click', () => renderImages(currentType, false));

    // Initial load
    renderImages('wallpaper');
  </script>

</body>
</html>
